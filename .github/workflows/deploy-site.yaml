name: Deploy to GitHub Pages

# run when a commit is pushed to "main" branch
on:
  push:
    branches:
    - main

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    # checkout to the commit that has been pushed
    - uses: actions/checkout@v6

    # Fetch the Toha fork into ../toha so the `replace` directive in go.mod
    # resolves. This lets the site ship theme features ahead of an upstream
    # release. Remove this step (and the replace) to build against upstream.
    - name: Fetch Toha fork
      run: git clone --depth 1 --branch feat/seo-structured-data https://github.com/maiani/toha.git ../toha

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true

    - name: Update Hugo Modules
      run: hugo mod tidy

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install node modules
      run: |
        hugo mod npm pack
        npm ci

    - name: Build
      run: hugo --minify

    # Push the generated content into the `gh-pages` branch.
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./public
        cname: www.andreamaiani.com
