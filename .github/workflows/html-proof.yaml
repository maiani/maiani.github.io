name: HTML Proofer

on:
  push:
    branches:
      - '*'
  pull_request:

permissions:
  contents: read

jobs:
  proof-html:
    runs-on: ubuntu-latest
    steps:
    # checkout to the commit that has been pushed
    - uses: actions/checkout@v6
      with:
        submodules: true  # Fetch Hugo themes (true OR recursive)
        fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod
    
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true

    - name: Update Hugo Modules
      run: hugo mod tidy

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install node modules
      run: |
        hugo mod npm pack
        npm ci

    - name: Build
      run: hugo --minify

    # Run HTML Proofer
    - uses: anishathalye/proof-html@v2.1.4
      with:
        directory: ./public
        enforce_https: false
